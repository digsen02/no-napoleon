 l_korean:
 # 🦅 마스카라 공국 메인 화면 소개문 (선생님 픽 1번)
 MAS_FLAVOR_TEXT:0 "에미르 압델 카데르가 이끄는 마스카라 공국은 지금 거대한 변화의 갈림길에 서 있습니다. 무능했던 옛 알제 중앙 정부가 무너진 틈을 타 오랑의 해안선을 장악했지만, 내부는 서구식 군사 제도를 도입하려는 에미르와 이에 반발하는 보수적인 부족장들 사이의 긴장감으로 팽팽합니다. 군주는 완고한 보수파와 귀족 가문들의 반발을 억누르며 절충안을 찾으면서도, 국가를 살아남게 할 급진적인 개혁의 고삐를 당겨야 합니다. 마스카라는 이 내부의 진통을 이겨내고 알제리 통일의 위업을 달성할 수 있겠습니까?"

 # 🦁 에이트 압바스 왕국 메인 화면 소개문 (선생님 픽 2번)
 AIT_FLAVOR_TEXT:0 "에이트 압바스의 전사들은 터키인들의 오만한 지배자들을 몰아내고 마침내 선조들의 땅을 되찾았습니다. 하지만 이들이 차지한 알제의 항구는 지중해의 모든 열강이 탐내는 황금빛 먹잇감입니다. 바다 너머의 서구 제국주의자들뿐만 아니라, 다시 북아프리카에 목줄을 채우려는 동쪽의 오스만 제국까지 호시탐탐 이들을 노리고 있습니다. 사방이 적으로 둘러싸인 이 외로운 사자는 피비린내 나는 투쟁 속에서 진정한 베르베르의 제국을 건설해야만 합니다."

 # 🕌 콘스탄티네 공국 메인 화면 소개문 (선생님 픽 4번: 즉석 신규 제작!)
 CON_FLAVOR_TEXT:0 "콘스탄티네는 알제리의 패권을 노리면서도, 동쪽 국경을 맞댄 튀니스의 위협을 늘 경계해야 하는 이중고에 시달리고 있습니다. 오스만 제국은 이들을 전위대로 내세워 튀니스까지 압박하려 하지만, 지나친 제국의 간섭은 콘스탄티네 내부의 반발을 불러일으키고 있습니다. 술탄의 충성스러운 대리인으로 남을 것인가, 아니면 제국의 힘을 빨아먹은 뒤 독립의 깃발을 치켜들 것인가. 동부의 지배자는 거대한 체스판 위에서 가장 위험한 수를 두어야 합니다."
# 🇲🇦 모로코 술탄국 메인 화면 소개문 (선생님 픽 1번)
 MOR_FLAVOR_TEXT:0 "아틀라스 산맥 너머 서쪽 끝에 자리 잡은 모로코 술탄국은, 프랑스 제국주의의 군화가 알제리를 짓밟지 못한 덕분에 대륙의 맹주로서 당당히 독립을 유지하고 있습니다. 동쪽의 위협이 사라진 지금, 알라위 왕조의 최우선 과제는 술탄의 통제력에서 벗어나 길날뛰는 남부 산악 지대의 반항적인 부족들을 굴복시키는 것입니다. 모로코는 낡은 전통의 틀을 깨고 험준한 산맥을 넘어 북아프리카의 진정한 제국으로 다시 한번 비상할 수 있겠습니까?"

 # 🇹🇳 튀니스 베이국 메인 화면 소개문 (선생님 픽 3번)
 TUN_FLAVOR_TEXT:0 "아프리카 대륙에서 가장 도시화되고 상업이 발달한 튀니스는 지중해 한가운데 빛나는 진주와 같습니다. 하지만 힘없는 부유함은 저주에 불과합니다. 오스만의 제국주의자들과 이탈리아의 자본가, 영국의 함대가 저마다 튀니스를 자신들의 영향력 아래 두기 위해 치열한 암투를 벌이고 있습니다. 이 외교전의 소용돌이 속에서, 튀니스의 지배자는 누구의 손을 잡고 누구를 배신할 것인지 가장 치명적인 선택을 내려야 합니다."
# 🕌 센나르 메인 화면 소개문 (태그: SNR)
 SNR_FLAVOR_TEXT:0 "청나일강과 백나일강이 교차하는 비옥한 요충지에서 수백 년간 군림해 온 센나르 술탄국(푼지 왕조)은 이제 찬란했던 과거를 뒤로한 채 서서히 침몰하고 있습니다. 무능한 술탄들과 탐욕스러운 지방 귀족들의 권력 투쟁으로 제국의 기틀은 무너졌고, 서쪽에서는 강력한 다르푸르가, 북쪽에서는 호전적인 샤이키야 부족들이 제국의 영토를 무섭게 잠식하고 있습니다. 과연 센나르는 부패한 구체제의 사슬을 끊어내고 제국의 위엄을 되찾아 동아프리카의 정당한 지배자로 부활할 수 있겠습니까?"

 # 🦅 샤이키야 연맹 메인 화면 소개문 (태그: SHQ)
 SHQ_FLAVOR_TEXT:0 "나일강 대만곡 지대의 험준한 사막을 지배하는 샤이키야 부족 연맹은, 오직 전투와 명예만을 숭상하는 정예 군사 귀족들의 땅입니다. 사슬갑옷을 입고 사막을 질주하는 이들의 무시무시한 기병대는 주변 농민들과 무역상들에게 잔혹하리만치 체계적인 통행세를 뜯어내며 독자적인 군사 추장국을 발전시켰습니다. 남쪽의 쇠락한 센나르를 무너뜨리고 수단의 진정한 주인이 될 기회가 눈앞에 왔지만, 북쪽 이집트의 잠재적인 야망 역시 무시할 수 없습니다. 샤이키야는 이 사막의 화약고 속에서 위대한 군사 제국을 선포할 준비가 되었습니까?"

 MDB_FLAVOR_TEXT:0 "에티오피아는 왕자들의 시대를 겪고 있습니다. 곤다르의 황제는 실질적인 권력이 없고,지방 지도자들이 저들끼리 국가를 나눠 가진 상태입니다. 제국이 재통합되는 날이 올까요?
