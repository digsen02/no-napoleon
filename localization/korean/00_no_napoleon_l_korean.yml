l_korean:
 # (기존 코드들...)
 # --- 국가 설명 (시작 화면용) ---
 FRA_FLAVOR_TEXT:0 "1830년 7월 혁명의 불길은 꺼지지 않았습니다. 입법공회는 혁명의 정통성을 수호하고 분열된 프랑스를 다시 하나로 묶으려 하지만, 끊임없는 내전과 외세의 간섭은 조국을 벼랑 끝으로 몰아가고 있습니다."
 FSR_FLAVOR_TEXT:0 "질서와 안정을 갈구하는 이들이 모여 세운 제2공화국은 입법공회의 무능을 비판하며 파리 탈환을 꿈꿉니다. 이들은 프랑스의 영광을 되찾기 위해 강력한 중앙 집권화를 주장합니다."
 FCR_FLAVOR_TEXT:0 "급진적인 민주주의자들과 시민들이 주축이 된 시민공화국은 왕정과 구체제의 잔재를 완전히 청산하고자 합니다. 이들에게 타협이란 없으며, 오직 진정한 인민의 공화국만이 목표입니다."
 BRI_FLAVOR_TEXT:0 "프랑스의 혼란을 틈타 주권을 되찾은 브르타뉴 공국은 더 이상 파리의 명령을 듣지 않습니다. 켈트의 혈통과 프랑스의 문화가 뒤섞인 이 땅은 이제 독자적인 운명을 개척하려 합니다."
 WGF_FLAVOR_TEXT:0 "라인강 유역의 자유 도시들과 영주들이 프랑스의 위협과 프로이센의 야심으로부터 스스로를 지키기 위해 결성한 자유국입니다. 시스레니아는 유럽의 새로운 화약고가 될 라인란트의 평화를 수호하고자 합니다."
 GFR_FLAVOR_TEXT:0 "분열된 모든 프랑스인이 꿈꾸는 궁극적인 조국입니다. 대프랑스는 내전의 상처를 치유하고 유럽의 패권을 다시 거머쥔 위대한 제국의 귀환을 상징합니다."
 PRU_FLAVOR_TEXT:0 "위대한 프리드리히 대왕이 남겨준 유산, 무패의 프로이센 군대는 주변 강대국들과 함께 폴란드를 분할하며 베를린의 위용을 사방에 떨쳤습니다. 하지만 전장을 뒤흔들던 영광의 시기는 지나가고, 이제 왕국의 국경 내부를 어지럽히는 것은 적국의 포성이 아닌 제어할 수 없는 극단적인 민족주의의 불길입니다. 호엔촐레른 왕조가 이 미증유의 사상적 혼란을 잠재우고 신성한 강토를 보전하기 위해선, 과거 왕국을 승리로 이끌었던 제2의 프리드리히 대왕과 같은 철인(鐵人)의 영도가 그 어느 때보다 절실합니다."
 DEN_FLAVOR_TEXT:0 "찬란한 문예 부흥과 지식의 황금기를 자랑하는 덴마크지만, 그 화려함의 이면에는 철권 통치로 유지되는 억압적인 구체제가 자리 잡고 있습니다. 특히 북쪽의 노르웨이를 향한 수백 년의 고압적인 지배는 이제 임계점에 달했습니다. 코펜하겐의 지식인들이 읊는 자유의 시가 빈민가의 바리케이드와 혁명의 포성으로 변하는 것은 시간문제입니다. 덴마크는 피를 흘리지 않고 이 위태로운 이중 왕국을 보전할 수 있습니까?"
 NOR_FLAVOR_TEXT:0 "'400년의 밤'. 노르웨이인들은 코펜하겐의 오만한 군주들 아래에서 숨죽여 지내야 했던 이 굴욕적인 세월을 그렇게 부릅니다. 덴마크의 왕관은 우리의 숲을 베어가고 우리의 피를 앗아갔지만, 험준한 피오르에서 단련된 노르웨이의 정신마저 꺾지는 못했습니다. 이제 얼어붙은 북해의 바람을 타고 거센 독립의 열망이 휘몰아치고 있습니다. 400년의 사슬을 끊어내고 진정한 자유를 쟁취하기 위해, 우리는 과연 어떤 피의 대가를 치러야만 합니까?"
 SWE_FLAVOR_TEXT:0 "서쪽으로는 덴마크의 해상 봉쇄에 가로막히고, 동쪽으로는 동방의 거대한 거인인 러시아 제국의 야심 찬 시선에 노출된 스웨덴은 발트해의 위태로운 외로운 섬과 같습니다. 제국의 심장과도 같은 스톡홀름의 조정은 서유럽 열강들의 외교적 압박과 호시탐탐 북방을 노리는 러시아의 칼날 사이에서 아슬아슬한 줄타기를 이어가고 있습니다. 사방이 잠재적 적들로 둘러싸인 이 고립된 반도에서, 스웨덴은 과연 외교적 기지와 군사적 결단력을 발휘하여 사방의 위협을 타파하고 북유럽의 위대한 수호자로 거듭날 수 있을까요?"
 NET_FLAVOR_TEXT:0 "한때 칠대양을 호령하며 세계의 부를 긁어모으던 네덜란드의 황금기는 이제 빛바랜 풍경화 속에만 존재합니다. 남쪽 프랑스의 압도적인 혁명적 침공을 기적적으로 피하여 과거의 낡은 지배 체제를 보전하긴 했으나, 그 타성 속에서 국가의 활력은 차갑게 식어버렸습니다. 네덜란드의 상선들은 대영제국의 압도적인 함대와 자본에 밀려 낡은 항구에서 무력하게 썩어가고 있습니다. 과거의 영광에 얽매인 이 늙은 사자는 다가오는 산업 시대의 굉음 속으로 서서히 침몰할 것입니까, 아니면 뼈를 깎는 근대화 개혁으로 다시 한번 대양의 주도권을 쥘 것입니까?"
 BAV_FLAVOR_TEXT:0 "폴란드 분할과 서유럽의 정세 변화 속에서 바이에른은 프랑켄과 팔츠 등 문화적·지리적으로 분절된 영토를 다스려야 하는 복잡한 과제를 안고 있습니다. 설상가상으로 경제적 침체는 이 파편화된 영토의 결속력을 약화시키고 있습니다. 왕국은 무너져가는 지방의 결속을 다잡기 위해 강력한 중앙집권화와 군사적 팽창을 요구받고 있습니다. 비테스바흐의 군주는 분열된 영토를 하나의 거대한 제국으로 묶어내고, 북독일의 패권 세력들에게 바이에른의 위엄을 증명할 준비가 되었습니까?"
 KOL_FLAVOR_TEXT:0 "현실 역사라면 진작에 세속화되어 역사 속으로 사라졌어야 할 쾰른 대주교령은, 구체제가 승리한 이 세계선에서 신성 로마 제국의 가장 기형적이고 위대한 유물로 살아남았습니다. 고풍스러운 성당의 종소리가 라인강을 울리지만, 대륙의 정세는 이 거룩한 영주들을 가만두지 않습니다. 특히 동쪽에서 들려오는 프로이센의 서슬 퍼런 야심은 이 부유한 라인란트의 요충지를 호시탐탐 노리고 있습니다. 성직자들의 통치령은 강대국들의 탐욕 속에서 자신들의 신성한 주권을 지켜낼 수 있을까요?"
 MUN_FLAVOR_TEXT:0 "현실 역사라면 진작에 세속화되어 역사 속으로 사라졌어야 할 뮌스터 주교령은, 구체제가 승리한 이 세계선에서 신성 로마 제국의 가장 기형적이고 위대한 유물로 살아남았습니다. 고풍스러운 성당의 종소리가 베스트팔렌의 하늘을 울리지만, 대륙의 정세는 이 거룩한 영주들을 가만두지 않습니다. 특히 동쪽에서 들려오는 프로이센의 서슬 퍼런 야심은 이 부유한 요충지를 호시탐탐 노리고 있습니다. 성직자들의 통치령은 강대국들의 탐욕 속에서 자신들의 신성한 주권을 지켜낼 수 있을까요?"
 SWI_FLAVOR_TEXT:0 "프랑스의 혁명적 폭풍이 알프스의 거대한 경계선에서 가로막힌 결과, 스위스는 19세기 서유럽의 심장부에 홀로 남겨진 거대한 중세의 박물관이 되었습니다. 주변의 열강들이 용광로를 불태우고 철도를 놓으며 자본주의의 폭주를 시작하는 동안, 스위스는 여전히 칸톤 간의 낡은 장벽과 종교적 반목 속에서 심각한 정치적 마비 상태를 겪고 있습니다. 이처럼 시대착오적인 구습을 고집스레 수호한 대가로, 연방의 대지 위에는 증기기관의 굉음도, 공장의 굴뚝도 찾아보기 힘들 정도로 산업의 맥박이 완전히 끊겨 있습니다. 과연 이 낡은 성채의 벽은 전 유럽을 뒤덮는 거대한 근대화의 해일을 버텨낼 수 있을까요? 연방이 스스로 족쇄를 부수고 깨어나지 못한다면, 사방의 거인들에게 대지가 유린당하는 비참한 종말을 맞이할 것입니다."
 SAR_FLAVOR_TEXT:0 "사보이아 가문의 유서 깊은 군사적 전통을 계승한 사르데냐-피에몬테 왕국은 분열된 북이탈리아에서 가장 날카로운 강철의 칼날입니다. 그러나 왕국을 둘러싼 현실은 결코 녹록지 않습니다. 서쪽에서는 산산조각 났음에도 여전히 위협적인 프랑스의 파편들이, 동쪽에서는 아드리아해를 호령하는 합스부르크의 거대한 거인이 왕국의 목을 죄어오고 있기 때문입니다. 이 사방의 위협을 뚫고 이탈리아의 해방과 통일이라는 위대한 성업을 이뤄내야 하는 무거운 사명이 국왕의 어깨 위에 놓여 있습니다. 왕국은 두 거인을 격퇴하고 반도 전체를 사보이아의 깃발 아래 통일할 수 있겠습니까?"
 WZB_FLAVOR_TEXT:0 "신성 로마 제국의 파편들이 고스란히 살아남은 남독일에서, 뷔르츠부르크 주교령은 프랑켄 지방의 가톨릭 제후들과 소영주들을 하나로 묶는 거대한 등대 역할을 하고 있습니다. 비록 영토는 작고 군대는 미약할지언정, 주교의 영적 권위는 그 어떤 총칼보다 강력한 결속력을 발휘합니다. 그러나 다가오는 민족주의의 열풍과 열강들의 영토 재편 야욕은 이 오래된 동맹 체제를 서서히 뒤흔들고 있습니다. 뷔르츠부르크는 내부의 결속을 다잡고 북독일과 남독일의 패권 전쟁 속에서 자신들만의 영광스러운 생존을 쟁취할 준비가 되었습니까?"
 GEN_FLAVOR_TEXT:0 "제노바 공화국은 지금 사방에서 조여오는 멸망의 공포와 마주하고 있습니다. 프랑스 혁명의 광풍은 피했으나, 그 대가로 찾아온 경제적 정체는 공화국의 숨통을 조이고 있으며 토리노의 군주들은 제노바를 자신들의 안방 항구로 삼으려는 노골적인 침략 의도를 숨기지 않고 있습니다. 사보이아의 늑대들이 아가리를 벌리고 리구리아의 해안선을 노리는 지금, 제노바는 분열된 의회를 하나로 묶고 위대한 선원들의 투지를 깨워 이 실존적 위기를 타파해야 합니다. 공화국은 오만한 왕정의 침략을 분쇄하고 주권의 불꽃을 지켜낼 수 있겠습니까?"
 VEN_FLAVOR_TEXT:0 "한때 전 세계에서 가장 거대하고 효율적인 선박 공장이었던 베네치아의 '아스널(Arsenale)' 조선소는 이제 녹슨 장창과 빛바랜 돛줄만이 가득한 중세의 유물로 전락했습니다. 지중해의 중심이라는 지정학적 가치와 막대한 해상 전통을 가졌음에도, 공화국은 산업화의 불꽃을 피우지 못한 채 석양 속으로 침몰해가고 있습니다. 베네치아는 낡은 조선소의 화로를 다시 불태워 증기 철갑선 함대를 찍어내고 대양의 패권을 되찾을 것입니까, 아니면 낡은 곤돌라 위에서 과거의 향수에 취해 무력하게 바다 밑으로 가라앉을 것입니까?"
 PAR_FLAVOR_TEXT:0 "사르데냐-피에몬테 왕국과 합스부르크 제국, 그리고 남쪽의 교황청이라는 거대 세력들이 마주하는 접경지, 파르마 공국은 북이탈리아 판도를 뒤흔들 숨은 열쇠입니다. 비록 영토는 작고 군대는 미약할지언정, 반도의 통일과 해방을 꿈꾸는 민족주의자들에게 파르마는 결코 지나칠 수 없는 쟁탈의 중심지입니다. 사방에서 밀려오는 외교적 압박과 첩보전의 소용돌이 속에서, 파르마의 조정은 영리한 줄타기로 생존을 이어갈 것입니까, 아니면 반도 전체를 불태울 거대한 격동의 서막을 열 것입니까?"
 SIC_FLAVOR_TEXT:0 "이탈리아 반도에서 가장 거대한 인구와 영토를 자랑하는 나폴리 왕국은 부르봉 가문의 절대왕정 아래 굳건히 결속되어 있습니다. 프랑스 혁명의 광풍 속에서도 왕관의 권위를 사수해 냈지만, 화려한 나폴리만의 이면에는 카르보나리의 자유주의 선동과 구체제의 모순에 신음하는 빈민들의 분노가 소리 없이 끓어오르고 있습니다. 왕국은 군대의 철권으로 내부의 급진주의를 짓밟고 보수의 성채를 지켜낼 것입니까, 아니면 남부의 압도적인 역량을 앞세워 북쪽의 소국들을 무릎 꿇리고 반도의 진정한 패권국으로 우뚝 설 것입니까?"
 SCL_FLAVOR_TEXT:0 "유럽과 북아프리카, 그리고 동방을 잇는 지중해의 가장 중요한 십자로에 위치한 시칠리아는 언제나 열강들이 탐내는 풍요로운 먹잇감이었습니다. 바다 너머 대영제국의 압도적인 함대와 호시탐탐 섬을 노리는 나폴리 왕국의 위협 속에서, 시칠리아가 독립을 유지할 길은 오직 스스로 강력한 해상 기지를 구축하는 것뿐입니다. 비록 내부 정치는 분열되고 산업은 뒤처져 있을지언정, 위대한 선원들의 전통은 살아 숨 쉬고 있습니다. 왕국은 이 천혜의 요충지를 통제하여 지중해의 진정한 해양 강국으로 거듭날 수 있겠습니까?"
 # (기존 코드들의 맨 아래에 이어 붙여넣기)

 # --- 브르타뉴 시작 이벤트 ---
 no_napoleon_bri_events.1.t:0 "브르타뉴의 갈림길"
 no_napoleon_bri_events.1.d:0 "파리의 불길이 프랑스 전역을 집어삼키는 가운데, 브르타뉴 공국에도 결단의 시간이 찾아왔습니다. 과거의 영토를 수복하기 위해 혼란 속으로 뛰어들 것입니까, 아니면 국경을 맞댄 메인과 앙주 지역을 완전히 우리의 본토로 동화시키며 실리를 챙길 것입니까?"
 no_napoleon_bri_events.1.f:0 "켈트의 유산과 프랑스의 현실이 교차하는 정점 위에서, 공국의 미래가 결정되려 합니다."
 no_napoleon_bri_events.1.a:0 "프랑스의 혼란은 기회다! 노르망디와 오를레앙까지 진격하라!"
 no_napoleon_bri_events.1.b:0 "외세의 싸움에 휘말릴 필요는 없다. 메인 앙주를 우리의 정당한 고향으로 삼으리라."
 # --- 시민공화국 시작 이벤트 ---
 no_napoleon_fcr_events.1.t:0 "위대한 공화국의 남진"
 no_napoleon_fcr_events.1.d:0 "시민공화국의 지도자들은 파리의 부르주아들과 군부 독재자들을 축출하기 전, 먼저 남서부의 푸아투와 아키텐 지역을 해방하여 혁명의 견고한 배후 기지로 삼아야 한다고 주장합니다. 하지만 우리의 이러한 확장은 유럽의 구체제 군주들과 경쟁 파벌들을 극도로 자극할 것입니다."
 no_napoleon_fcr_events.1.a:0 "푸아투와 아키텐은 공화국의 정당한 영토다! (전쟁 명분 획득)"
 no_napoleon_fcr_events.1.b:0 "지금은 내실을 다질 때다. 성급한 확장은 파멸을 부른다."
 no_napoleon_fcr_events.1.b.tt:0 "현재 상태를 유지하며 당분간 외교적 마찰을 피합니다."
 # --- 제2공화국 시작 이벤트 ---
 no_napoleon_fsr_events.1.t:0 "파리 탈환의 결단"
 no_napoleon_fsr_events.1.d:0 "입법공회의 무능과 정통성 부재를 규탄하며 일어선 제2공화국은, 진정한 프랑스의 정통 정부로 인정받기 위해 심장부인 파리(일드프랑스)를 조속히 탈환해야 마땅하다고 주장합니다. 하지만 파리를 향한 우리의 노골적인 칼끝은 다른 내전 파벌들과 구체제 군주국들을 극도로 자극할 것입니다."
 no_napoleon_fsr_events.1.a:0 "파리는 공화국의 심장이다! 진격 준비를 하라! (일드프랑스 명분 획득)"
 no_napoleon_fsr_events.1.b:0 "지금은 힘을 기를 때다. 성급한 수도 진격은 고립을 자초할 뿐이다."
 no_napoleon_fsr_events.1.b.tt:0 "현재 상태를 유지하며 당분간 외교적 마찰을 피합니다."
 pru_intro.1.t:0 "국가를 가진 군대"
 pru_intro.1.d:0 ""프로이센은 국가를 가진 군대이다." 역사학자들의 찬사처럼 대왕의 유산은 완벽한 군사 기계를 만들어냈고, 그 검 끝으로 폴란드의 영토를 찬탈하며 북독일의 패권을 쥐었습니다. 하지만 검이 너무 날카로우면 제 몸을 베는 법입니다. 영토 확장으로 품게 된 수많은 폴란드인 신민들과 독일인들 사이의 극심한 민족 갈등은 이제 왕국의 심장을 겨누는 칼날이 되었습니다. 무패의 신화는 오직 외부를 향할 때만 유효합니다. 만약 군대가 갈라져 서로에게 총구를 겨눈다면—"
 pru_intro.1.f:0 "승리의 찬가를 부를 자는..."
 pru_intro.1.a:0 "단 한 명도 없을 것입니다."

