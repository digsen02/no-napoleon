l_korean:
 fractured_france.1.t: "분열된 프랑스, 그리고 야망"
 fractured_france.1.d: "조국은 갈기갈기 찢어져 수많은 소국으로 나뉘었지만, 우리의 가슴속에는 여전히 위대한 하나 된 프랑스의 혼이 불타오르고 있습니다. 유럽의 열강들이 우리의 과격한 행보를 우려하며 침략자라 비난할지언정, 이제 분열된 형제들을 어떻게든 하나로 모을 때입니다!"
 fractured_france.1.f: "진격하라! 통일된 조국의 영광을 위하여!"
 fractured_france.1.a: "모든 프랑스인의 땅은 오직 우리의 것이다! (무력 통일)"
 fractured_france.1.b: "같은 핏줄끼리 피를 흘릴 수는 없다. (외교적 접근)"

 fractured_france_lore.1.t: "프랑스의 붕괴 제1부: 혁명의 황혼"
 fractured_france_lore.1.d: "테르미도르 반동 이후, 자코뱅의 공포 정치는 끝났습니다,자코뱅 대신, 프랑스는 총재정부라는 새로운 체제를 맞이했습니다. 하지만 극심한 부패와 무능 속에서 총재정부는 단 몇 년 만에 파산 선고를 받았습니다.\n\n위기에 빠진 공화국을 구원한 것은 전장의 영웅들이었습니다. 장 빅토르 마리 모로를 위시한 프랑스의 명장들은 무능한 정치인들을 몰아내고 '입법공회'를 수립하여 국가의 질서를 회복했습니다. 군부와 엘리트들의 철권통치 아래, 프랑스는 마침내 안정을 되찾은 듯 보였습니다."
 fractured_france_lore.1.f: "그러나 시간이라는 것이 흐르면 모든 것은 노쇠하기 마련이다."
 fractured_france_lore.1.a: "시간이 흘러..."

 fractured_france_lore.2.t: "프랑스의 붕괴 제2부: 1830년 7월 혁명"
 fractured_france_lore.2.d: "수십 년의 세월이 흐르며, 한때 공화국의 영웅이었던 입법공회의 명장들은 늙고 병들거나 세상을 떠났습니다. 권력은 노쇠했고, 질서는 부패로 얼룩졌습니다.\n\n1830년 7월, 낡은 군사 정권에 분노한 민중들이 파리의 바리케이드를 넘어 일어났습니다. '진정한 공화국'을 세우자는 외침이 프랑스 전역을 뒤흔들었으나, 파벌 싸움을 하던 입법공회 수뇌부는,명장들이 세상을 떠났기 때문에,시위를 진압하는데 실패했고 결국 초기 진압의 골든타임을 놓치고 말았습니다. 시위는 곧 무장 봉기로 변모했고, 조국은 돌이킬 수 없는 내전의 소용돌이로 빠져들었습니다."
 fractured_france_lore.2.f: "영웅들이 떠난 자리에는 오직 혼란만이 남았다."
 fractured_france_lore.2.a: "그리고 끔찍한 내전이 시작되었다."

 fractured_france_lore.3.t: "프랑스의 붕괴 제3부: 피로 맺은 휴전"
 fractured_france_lore.3.d: "동족상잔의 비극은 오랫동안 지속되었습니다. 급진파, 왕당파, 온건 공화파 등 각자의 이념을 좇는 세력들이 갈라져 프랑스 전역은 거대한 도축장으로 변했습니다.\n\n결국 모든 파벌이 피를 흘리다 역량이 고갈된 끝에, 1833년 불안정한 임시 휴전 협정이 맺어졌습니다. 그로부터 3년이 지난 지금, 차가웠던 휴전의 끝이 다가오고 있습니다. 산산조각 난 프랑스의 운명을 결정지을 거대한 폭풍이 다시 한번 몰아치려 하고 있습니다."
 fractured_france_lore.3.f: "이제 역사의 다음 장을 써 내려갈 시간이다."
 fractured_france_lore.3.a: "조국의 운명이 우리 손에 달렸다."